<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Fidget Board</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double:wght@100..900&family=Bitcount+Prop+Single:wght@100..900&family=Moirai+One&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="parent">
      <div class="title">
        <h1>Broken Board</h1>
      </div>
      <div id="fidgets">
        <div id="drumduo">
          <div id="drumset">
            <button
              id="crash"
              class="drum"
              style="margin: 8px; max-height: 60px"
            ></button>

            <button
              id="snare"
              class="drum"
              style="margin: 20px; flex: 3"
            ></button>

            <button id="f1" class="drum"></button>

            <button
              id="f2"
              class="drum"
              style="margin: 15px; max-height: 10px"
            ></button>

            <button id="f3" class="drum" style="margin: 25px; flex: 2"></button>

            <button id="f4" class="drum" style="margin: 35px"></button>
          </div>
          <div id="drum2">
            <button class="d2">c</button>
            <button class="d2">d</button>
            <button class="d2">e</button>
            <button class="d2">f</button>
            <button class="d2">g</button>
            <button class="d2">a</button>
            <button class="d2">b</button>
          </div>
        </div>

        <div id="figduo">
          <div id="beatboard">
            <button class="beat" style="margin: 20px">
              <img src="images/xylophone.png" style="height: 80px" />
            </button>

            <button class="beat" style="flex: 1">
              <img src="images/guitar (1).png" style="height: 150px" />
            </button>

            <button class="beat" style="margin: 30px">
              <img src="images/guitar.png" style="height: 120px" />
            </button>

            <button class="beat" style="margin: 30px; flex: 0">
              <img src="images/tambourine.png" style="height: 150px" />
            </button>

            <button class="beat" style="flex: 0; margin: 10px">
              <img src="images/xylophone (1).png" style="height: 150px" />
            </button>
          </div>

          <div id="funduo">
            <div id="fun">
              <button class="funny">
                <img src="images/recorder.png" style="height: 120px" />
              </button>
              <button class="funny">
                <img src="images/trumpet.png" style="height: 120px" />
              </button>
              <button class="funny"></button>
              <button class="funny">
                <img src="images/recorder.png" style="height: 120px" />
              </button>
              <button class="funny">
                <img src="images/recorder.png" style="height: 120px" />
              </button>
              <button class="funny">
                <img src="images/recorder.png" style="height: 120px" />
              </button>
              <button class="funny">
                <img src="images/recorder.png" style="height: 120px" />
              </button>
            </div>

            <div id="soundeffects">
              <button class="sound"></button>
              <button class="sound"></button>
              <button class="sound"></button>
              <button class="sound"></button>
              <button class="sound"></button>
              <button class="sound"></button>
              <button class="sound"></button>
              <button class="sound"></button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <footer>made by Ridhi</footer>
    <script
      src="https://code.jquery.com/jquery-4.0.0.js"
      integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
      crossorigin="anonymous"
    ></script>
    <script src="index.js" defer></script>
  </body>
</html>
